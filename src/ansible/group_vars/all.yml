---
# The deployer account Ansible connects as for all non-bootstrap runs.
# Bootstrap.yml creates this account on a fresh VM; site.yml re-asserts it.
deployer_user:
  name: deployer
  groups: []
  ssh_keys:
    - "ssh-rsa "

ansible_user: "{{ deployer_user.name }}"
# Inventory connects via the hardened SSH port. During the first run that
# migrates an existing host from 22 -> ssh_port, override on the CLI:
#   ansible-playbook cluster-initialization.yml -e ansible_port=22
ansible_port: "{{ ssh_port }}"

# Users managed by the user_management role.
# See roles/user_management/defaults/main.yml for the full schema.
# The deployer is included so its authorized_keys stays in sync.
users:
  - name: "{{ deployer_user.name }}"
    groups: "{{ deployer_user.groups }}"
    sudo: true
    ssh_keys: "{{ deployer_user.ssh_keys }}"
  - name: michiel
    sudo: true
    ssh_keys:
      - "ssh-rsa "

# ---------------------------------------------------------------------------
# Hardening configuration. Each block maps onto a single role; the role's
# defaults/main.yml documents every field. Values here override defaults.
# ---------------------------------------------------------------------------

# Timezone / base packages / journald.
timezone: Europe/Brussels

# SSH posture.
ssh_port: 2222
ssh_allow_users:
  - "{{ deployer_user.name }}"
  - michiel

# Firewall: per-host cluster peers are auto-derived from the cluster_servers
# group below; these are the externally exposed services. Cilium uses VXLAN
# tunnel mode by default (8472/udp) and a health endpoint (4240/tcp).
firewall_public_tcp_ports:
  - 80    # ingress HTTP
  - 443   # ingress HTTPS
firewall_public_udp_ports: []
# Ports allowed only between cluster_servers peers.
firewall_cluster_tcp_ports:
  - 6443      # K3s API
  - 10250     # kubelet
  - 2379      # etcd client (HA control plane)
  - 2380      # etcd peer
  - 4240      # cilium-agent health
  - 4244      # hubble server
  - 4245      # hubble relay
  - 9962      # cilium-agent prometheus metrics
  - 9963      # cilium-operator prometheus metrics
  - 9964      # hubble metrics
firewall_cluster_udp_ports:
  - 8472      # cilium VXLAN
  - 51871     # cilium WireGuard (if encryption enabled later)

# unattended-upgrades.
auto_updates_reboot: false

# Kernel hardening is on by default; tweakables live in the role's defaults.

# K3s + Cilium prerequisites are on by default; tweakables live in the role's
# defaults. Cilium with kube-proxy replacement does not use br_netfilter.
