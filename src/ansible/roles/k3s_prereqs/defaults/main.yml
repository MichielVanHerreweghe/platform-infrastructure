---
# Sysctl values that K3s + Cilium require. Kept distinct from kernel_hardening
# so a future tighten of hardening sysctls cannot silently disable forwarding
# or BPF and break pod networking.
#
# Notes specific to Cilium with kube-proxy replacement (the planned topology):
#   - br_netfilter / bridge-nf-call-iptables are NOT required (Cilium uses
#     eBPF, not the bridge netfilter path).
#   - rp_filter is set to 0 because Cilium does its own reverse-path checks
#     and strict rp_filter drops pod traffic with otherwise-valid source IPs.
#   - unprivileged_bpf_disabled stays at 0; Cilium loads eBPF from privileged
#     pods, but some sub-components rely on bpf() syscalls being available.
k3s_prereqs_sysctls:
  net.ipv4.ip_forward: 1
  net.ipv4.conf.all.forwarding: 1
  net.ipv6.conf.all.forwarding: 1
  net.ipv4.conf.all.rp_filter: 0
  net.ipv4.conf.default.rp_filter: 0
  # Larger socket buffers help with the cilium-agent gossip / xDP traffic on
  # busy nodes; these are the values recommended by the Cilium tuning guide.
  net.core.rmem_max: 16777216
  net.core.wmem_max: 16777216
  net.core.netdev_max_backlog: 16384
  # File descriptors. kubelet + cilium-agent + a handful of pods saturate the
  # default 1024 quickly under load.
  fs.inotify.max_user_instances: 8192
  fs.inotify.max_user_watches: 524288
  fs.file-max: 1048576

# Kernel modules to load at boot. Cilium needs none of the iptables/bridge
# helpers, but K3s falls back to iptables for some host-port handling, so the
# iptables modules are still loaded.
k3s_prereqs_kernel_modules:
  - overlay
  - ip_tables
  - ip6_tables
  - nf_nat
  - xt_conntrack
  - xt_MASQUERADE

# Where to mount the BPF filesystem. Cilium expects this at /sys/fs/bpf.
k3s_prereqs_bpffs_path: /sys/fs/bpf

# Per-process file/proc limits for cluster workloads.
k3s_prereqs_nofile_soft: 65536
k3s_prereqs_nofile_hard: 1048576
k3s_prereqs_nproc_soft: 65536
k3s_prereqs_nproc_hard: 1048576
