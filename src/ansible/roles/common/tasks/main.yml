---
- name: Set system timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install chrony for NTP (etcd quorum requires tight clock sync)
  ansible.builtin.apt:
    name: chrony
    state: present

- name: Ensure chrony is enabled and running
  ansible.builtin.systemd_service:
    name: chrony
    enabled: true
    state: started

- name: Ensure journald drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure journald persistence and size caps
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/00-persistent.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Journal]
      Storage={{ common_journald_storage }}
      SystemMaxUse={{ common_journald_max_use }}
      SystemMaxFileSize={{ common_journald_max_file_size }}
  notify: Restart journald
