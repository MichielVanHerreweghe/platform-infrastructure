---
- name: Ensure supplementary groups exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: >-
    {{
      users
      | selectattr('groups', 'defined')
      | map(attribute='groups')
      | flatten | unique | list
    }}

- name: Ensure user accounts are present
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default([]) }}"
    append: true
    shell: "{{ item.shell | default('/bin/bash') }}"
    create_home: true
    state: present
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.state | default('present') == 'present'

- name: Ensure .ssh directory exists for managed users
  ansible.builtin.file:
    path: "/home/{{ item.name }}/.ssh"
    state: directory
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0700"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.state | default('present') == 'present'

- name: Manage authorized_keys (exclusive)
  ansible.builtin.copy:
    dest: "/home/{{ item.name }}/.ssh/authorized_keys"
    content: "{{ (item.ssh_keys | default([])) | join('\n') }}\n"
    owner: "{{ item.name }}"
    group: "{{ item.name }}"
    mode: "0600"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.state | default('present') == 'present'

- name: Grant passwordless sudo via /etc/sudoers.d
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.state | default('present') == 'present'
    - item.sudo | default(false)

- name: Revoke sudo for users without sudo flag or marked absent
  ansible.builtin.file:
    path: "/etc/sudoers.d/{{ item.name }}"
    state: absent
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: >-
    item.state | default('present') == 'absent'
    or not (item.sudo | default(false))

- name: Remove absent users
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: absent
    remove: true
    force: true
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.state | default('present') == 'absent'
