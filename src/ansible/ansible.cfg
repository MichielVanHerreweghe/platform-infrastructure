[defaults]
inventory = inventory.yml
roles_path = roles
collections_path = collections
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
forks = 10
interpreter_python = auto_silent
# Password for ansible-vault-encrypted variables (currently
# k3s_cluster_init_token). The file is gitignored; create it locally with:
#   echo '<vault-pass>' > .vault_pass && chmod 600 .vault_pass
# In CI, write the password from a secret into the same path before invoking
# ansible-playbook, or set ANSIBLE_VAULT_PASSWORD_FILE to a different path.
vault_password_file = .vault_pass

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
